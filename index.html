<style>
:root{
  --bg:#ffffff;
  --text:#121826;
  --accent:#121826;
  --active:#fbbf24;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}
.app{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.sustain-button{
  position:absolute;
  right:18px;
  bottom:calc(100% + 10px);
  z-index:10;
  appearance:none;
  display:flex;
  align-items:center;
  gap:2px;
  min-width:106px;
  border:1px solid #cbd5e1;
  border-radius:999px;
  background:#fff;
  color:#1e293b;
  padding:5px 7px 5px 8px;
  font:700 10px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  letter-spacing:0;
  cursor:pointer;
  user-select:none;
}
.sustain-button.active{
  border-color:#1e293b;
}
.sustain-label{
  width:72px;
  text-align:left;
  white-space:nowrap;
}
.sustain-switch{
  position:relative;
  width:26px;
  height:14px;
  flex:0 0 auto;
  border-radius:999px;
  background:#cbd5e1;
  transition:background .12s ease;
}
.sustain-switch::after{
  content:"";
  position:absolute;
  top:2px;
  left:2px;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 1px 2px rgba(15,23,42,.25);
  transition:transform .12s ease;
}
.sustain-button.active .sustain-switch{
  background:#1e293b;
}
.sustain-button.active .sustain-switch::after{
  transform:translateX(12px);
}
.piano-wrap{
  position:relative;
  width:100%;
  background:#fff;
}
.piano-shell{
  margin:0;
  padding:0;
  background:#fff;
}
.piano{
  position:relative;
  width:100%;
  aspect-ratio:52 / 5.5;
  overflow:hidden;
  background:#fff;
}
.piano::before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:1px;
  background:#1e293b;
  z-index:5;
  pointer-events:none;
}
.white,.black{
  position:absolute;
  user-select:none;
  touch-action:none;
  transition:background .06s ease;
}
.white{
  background:#fff;
  border-top:1px solid #1e293b;
  border-right:1px solid #1e293b;
  border-bottom:1px solid #1e293b;
  height:100%;
}
.white.first-white{border-left:1px solid #1e293b}
.black{
  z-index:2;
  background:#1e293b;
  border:1px solid #1e293b;
  border-top:none;
  height:65%;
}
.white.active,.black.active{
  background:var(--active) !important;
  box-shadow:none !important;
}
.midi-notice{
  display:none;
  width:100%;
  background:#fef3c7;
  border-bottom:1px solid #f59e0b;
  color:#92400e;
  font:500 11px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  text-align:center;
  padding:7px 16px;
  box-sizing:border-box;
}
.midi-notice.visible{display:block;}

<body>
<div class="app" id="app">
  <div class="midi-notice" id="midiNotice">
    이 브라우저는 MIDI를 지원하지 않습니다. MIDI 기기를 연결하려면 Chrome을 사용해 주세요.
  </div>
  <div class="piano-wrap">
    <button class="sustain-button" id="sustainButton" type="button" aria-pressed="false">
      <span class="sustain-label" id="sustainLabel">SUSTAIN OFF</span>
      <span class="sustain-switch" aria-hidden="true"></span>
    </button>
    <div class="piano-shell">
      <div class="piano" id="piano"></div>
    </div>
  </div>
</div>

<script>
const MMIN = 21;
const MMAX = 108;
const IS_BLACK = [0,1,0,1,0,0,1,0,1,0,1,0].map(Boolean);
// 검은 건반 위치 보정값 (단위: 흰 건반 너비 기준 %)
// 음정 클래스(midi % 12): 1=C#, 3=D#, 6=F#, 8=G#, 10=A#
const BLACK_TRANSLATE = {1:-67,3:-33,6:-72,8:-50,10:-28};

const piano = document.getElementById("piano");
const sustainButton = document.getElementById("sustainButton");
const sustainLabel = document.getElementById("sustainLabel");

let keyEls = {};
let clickHeld = new Set();
let midiHeld = new Set();
let midiSustained = new Set();
let pedalDown = false;
let sustainEnabled = false;
let midiInitStarted = false;

function baseClass(midi){
  return IS_BLACK[midi % 12] ? "black" : "white";
}

function renderKeyState(midi){
  const el = keyEls[midi];
  if(!el) return;
  el.className = baseClass(midi);
  if(clickHeld.has(midi) || midiHeld.has(midi) || midiSustained.has(midi)){
    el.classList.add("active");
  }
}

function noteOn(midi, fromMidi = false){
  if(midi < MMIN || midi > MMAX) return;
  if(fromMidi){
    midiSustained.delete(midi);
    midiHeld.add(midi);
  }
  else clickHeld.add(midi);
  renderKeyState(midi);
}

function noteOff(midi, fromMidi = false){
  if(fromMidi){
    midiHeld.delete(midi);
    if(sustainEnabled && pedalDown) midiSustained.add(midi);
    else midiSustained.delete(midi);
  }
  else{
    clickHeld.delete(midi);
  }
  renderKeyState(midi);
}

function releaseSustainedNotes(){
  const released = [...midiSustained];
  midiSustained.clear();
  released.forEach(renderKeyState);
}

function setSustainEnabled(enabled){
  sustainEnabled = enabled;
  sustainButton.classList.toggle("active", sustainEnabled);
  sustainButton.setAttribute("aria-pressed", String(sustainEnabled));
  sustainLabel.textContent = sustainEnabled ? "SUSTAIN ON" : "SUSTAIN OFF";
  if(!sustainEnabled) releaseSustainedNotes();
}

function setPedal(value){
  const nextPedalDown = value >= 64;
  if(pedalDown === nextPedalDown) return;
  pedalDown = nextPedalDown;
  if(!sustainEnabled || pedalDown) return;
  releaseSustainedNotes();
}

sustainButton.addEventListener("click", () => {
  setSustainEnabled(!sustainEnabled);
});

function buildPiano(){
  const blackLayer = document.createElement("div");
  blackLayer.style.cssText = "position:absolute;inset:0;pointer-events:none;";
  let whiteCount = 0;
  for(let midi = MMIN; midi <= MMAX; midi++) if(!IS_BLACK[midi % 12]) whiteCount++;
  const whiteWidth = 100 / whiteCount;
  const whiteLeft = {};
  let index = 0;

  for(let midi = MMIN; midi <= MMAX; midi++){
    if(IS_BLACK[midi % 12]) continue;
    const el = document.createElement("div");
    el.className = "white";
    if(index === 0) el.classList.add("first-white");
    el.style.left = `${index * whiteWidth}%`;
    el.style.width = `${whiteWidth}%`;
    wirePointer(el, midi);
    piano.appendChild(el);
    keyEls[midi] = el;
    whiteLeft[midi] = index * whiteWidth;
    index++;
  }

  for(let midi = MMIN; midi <= MMAX; midi++){
    if(!IS_BLACK[midi % 12]) continue;
    let prev = midi - 1;
    while(IS_BLACK[prev % 12]) prev--;
    const el = document.createElement("div");
    el.className = "black";
    el.style.left = `${whiteLeft[prev] + whiteWidth}%`;
    el.style.width = `${whiteWidth * 0.6}%`;
    el.style.transform = `translateX(${BLACK_TRANSLATE[midi % 12]}%)`;
    el.style.pointerEvents = "auto";
    wirePointer(el, midi);
    blackLayer.appendChild(el);
    keyEls[midi] = el;
  }

  piano.appendChild(blackLayer);
}

function wirePointer(el, midi){
  el.addEventListener("pointerdown", (event) => {
    event.preventDefault();
    el.setPointerCapture(event.pointerId);
    noteOn(midi, false);
  });
  el.addEventListener("pointerup", () => noteOff(midi, false));
  el.addEventListener("pointercancel", () => noteOff(midi, false));
  // pointerleave는 setPointerCapture 활성 시 발생하지 않으므로 제거
}

async function initMidiAccess(){
  if(midiInitStarted || !navigator.requestMIDIAccess) return;
  midiInitStarted = true;
  try{
    const access = await navigator.requestMIDIAccess();
    const inputs = [...access.inputs.values()];
    if(!inputs.length) return;
    for(const input of inputs){
      input.onmidimessage = ({data}) => {
        const [status, d1, d2] = data;
        const type = status & 0xf0;
        if(type === 0x90 && d2 > 0) noteOn(d1, true);
        else if(type === 0x80 || (type === 0x90 && d2 === 0)) noteOff(d1, true);
        else if(type === 0xb0 && d1 === 64) setPedal(d2);
      };
    }
  }catch(error){
    midiInitStarted = false;
  }
}

buildPiano();
if(!navigator.requestMIDIAccess){
  document.getElementById("midiNotice").classList.add("visible");
}else{
  initMidiAccess();
}
</script>
